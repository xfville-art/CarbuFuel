<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarbuFuel FIX</title>
    <style>
        body { background: #0a0c0f; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #161a21; border: 1px solid #21262d; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .price { color: #3fb950; font-size: 2rem; font-weight: bold; float: right; }
        .name { font-weight: bold; font-size: 1.1rem; color: #f0a500; }
        select, input, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; font-size: 1rem; }
        button { background: #f0a500; font-weight: bold; cursor: pointer; }
        .meta { color: #8b949e; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h2 style="color:#f0a500; text-align:center;">⛽ CarbuFuel GIEN-FIX</h2>
    
    <div style="background:#161a21; padding:15px; border-radius:15px; margin-bottom:20px;">
        <input id="city" type="text" placeholder="Gien, 45500...">
        <select id="fuel">
            <option value="gazole">Gazole</option>
            <option value="e10" selected>SP95-E10</option>
            <option value="sp98">SP98</option>
            <option value="e85">E85</option>
        </select>
        <button onclick="loadData()">AFFICHER LES PRIX</button>
    </div>

    <div id="result"></div>

<script>
// Coordonnées de Gien par défaut pour être sûr que ça marche chez toi
let currentLat = 47.6844;
let currentLon = 2.6289;

async function loadData() {
    const resDiv = document.getElementById('result');
    const fuel = document.getElementById('fuel').value;
    const city = document.getElementById('city').value;

    resDiv.innerHTML = "<p style='text-align:center'>Recherche en cours dans la base d'État...</p>";

    // 1. Si une ville est entrée, on cherche ses coordonnées
    if(city) {
        try {
            const rCity = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(city)}`);
            const dCity = await rCity.json();
            if(dCity.features.length > 0) {
                currentLon = dCity.features[0].geometry.coordinates[0];
                currentLat = dCity.features[0].geometry.coordinates[1];
            }
        } catch(e) { console.log("Erreur ville"); }
    }

    // 2. Requête simplifiée au maximum (on cherche les 50 plus proches de Gien/Position)
    // On enlève le filtre 'where' complexe qui fait souvent tout bugger
    const url = `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?order_by=distance(geolocalisation%2C%20GEOM'POINT(${currentLon}%20${currentLat})')&limit=50`;

    try {
        const response = await fetch(url);
        const data = await response.json();
        const rawStations = data.results || [];

        // 3. On trie et on filtre nous-mêmes en JavaScript
        const filtered = rawStations.map(s => {
            // On cherche le prix peu importe le nom de la colonne
            const p = s[`prix_${fuel}`] || s[`${fuel}_prix`] || s[fuel];
            return {
                nom: s.nom || s.enseigne || "Station",
                adresse: s.adresse || s.ville,
                ville: s.ville || "",
                prix: parseFloat(p),
                dist: s.dist || 0 // L'API v2.1 renvoie parfois directement la distance
            };
        }).filter(s => s.prix > 0);

        if(filtered.length === 0) {
            resDiv.innerHTML = `<div class='card'>❌ Aucun prix trouvé pour ${fuel}.<br>L'API ne répond pas pour ce carburant en ce moment.</div>`;
        } else {
            resDiv.innerHTML = filtered.map(s => `
                <div class="card">
                    <div class="price">${s.prix.toFixed(3)}€</div>
                    <div class="name">${s.nom}</div>
                    <div class="meta">${s.adresse}</div>
                    <div class="meta" style="color:#3fb950">📍 ${s.ville}</div>
                </div>
            `).join('');
        }
    } catch (error) {
        resDiv.innerHTML = "<div class='card'>Erreur réseau. Réessaye dans 10 secondes.</div>";
    }
}

// Lancer au démarrage pour Gien
window.onload = loadData;
</script>
</body>
</html>
