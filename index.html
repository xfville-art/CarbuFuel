<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CarbuFuel ⛽</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0c0f">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600&display=swap');
  :root { --orange: #f0a500; --red: #e05c2a; --green: #3fb950; --bg: #0a0c0f; --card: #111318; --border: #1e2229; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: #fff; font-family: 'Barlow', sans-serif; padding: 15px; max-width: 500px; margin: auto; padding-bottom: 50px; }
  
  h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 2.2rem; font-weight: 900; background: linear-gradient(135deg, var(--orange), var(--red)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 15px; }
  
  .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
  input { flex: 1; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: #fff; font-size: 1rem; outline: none; }
  .btn-icon { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: var(--orange); cursor: pointer; }

  /* Carburants avec couleurs */
  .fuel-grid { display: flex; flex-wrap: wrap; gap: 6px; margin: 15px 0; }
  .fuel-btn { padding: 8px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: #888; font-size: 0.75rem; font-weight: 800; cursor: pointer; }
  .fuel-btn[data-f="gazole"].active { background: #dec009; color: #000; border-color: #dec009; }
  .fuel-btn[data-f="e10"].active, .fuel-btn[data-f="sp98"].active { background: #3fb950; color: #000; border-color: #3fb950; }
  .fuel-btn[data-f="e85"].active { background: #0066ad; color: #fff; border-color: #0066ad; }
  .fuel-btn[data-f="all"].active { background: var(--orange); color: #000; border-color: var(--orange); }

  .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
  .wide { grid-column: 1 / -1; }
  button { padding: 12px; border-radius: 10px; border: none; font-weight: 700; font-family: 'Barlow Condensed'; cursor: pointer; font-size: 1rem; }
  .btn-primary { background: linear-gradient(135deg, var(--orange), var(--red)); color: #000; }
  .btn-ghost { background: var(--card); color: #aaa; border: 1px solid var(--border); }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; margin-bottom: 10px; }
  .st-header { display: flex; align-items: center; gap: 12px; }
  
  /* Logo */
  .logo-box { width: 46px; height: 46px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #fff; flex-shrink: 0; font-size: 0.8rem; text-align: center; }
  
  .st-info { flex: 1; min-width: 0; }
  .st-name { font-family: 'Barlow Condensed'; font-size: 1.25rem; font-weight: 800; text-transform: uppercase; color: #fff; }
  .st-city { color: #555; font-size: 0.8rem; }
  
  .price-side { text-align: right; }
  .p-val { font-family: 'Barlow Condensed'; font-size: 1.7rem; font-weight: 900; line-height: 1; }
  .p-unit { font-size: 0.6rem; color: #444; font-weight: 800; }

  textarea { width: 100%; background: #000; color: var(--green); border: 1px solid var(--border); border-radius: 10px; padding: 12px; font-family: monospace; font-size: 0.85rem; margin-top: 10px; }
  .loader { width: 20px; height: 20px; border: 3px solid #333; border-top-color: var(--orange); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<h1>⛽ CarbuFuel</h1>

<div class="search-row">
  <input id="city" type="text" placeholder="Gien, 45500..." onkeydown="if(event.key==='Enter')search()">
  <div class="btn-icon" onclick="search()">🔍</div>
  <div class="btn-icon" onclick="gps()">📍</div>
</div>

<div class="fuel-grid">
  <button class="fuel-btn active" data-f="all" onclick="setFuel('all',this)">TOUS</button>
  <button class="fuel-btn" data-f="gazole" onclick="setFuel('gazole',this)">GAZOLE</button>
  <button class="fuel-btn" data-f="e10" onclick="setFuel('e10',this)">E10</button>
  <button class="fuel-btn" data-f="sp98" onclick="setFuel('sp98',this)">SP98</button>
  <button class="fuel-btn" data-f="e85" onclick="setFuel('e85',this)">E85</button>
</div>

<div class="action-grid">
  <button class="btn-primary wide" onclick="bestDeal()">🔥 LE MOINS CHER</button>
  <button class="btn-ghost" onclick="renderList()">📋 LISTE</button>
  <button class="btn-ghost" onclick="autoTikTok()">🎬 SCRIPT TIKTOK</button>
  <button class="btn-ghost wide" onclick="generateVideo()">🎥 PROMPT VIDÉO IA</button>
</div>

<div id="result"></div>

<script>
let stations = [], activeFuel = 'all', uLat, uLon;

const MAP = {
  gazole: { keys:['gazole_prix','Gazole'], color: '#dec009' },
  e10: { keys:['e10_prix','E10'], color: '#3fb950' },
  sp98: { keys:['sp98_prix','SP98'], color: '#1a9131' },
  e85: { keys:['e85_prix','E85'], color: '#0066ad' }
};

function getBrandInfo(s) {
  // On crée une grosse chaine de texte avec tous les champs possibles pour chercher la marque
  const searchTxt = JSON.stringify(s).toUpperCase();
  
  if (searchTxt.includes('TOTAL')) return {n: 'TOTAL', c: '#ff3030'};
  if (searchTxt.includes('LECLERC')) return {n: 'E.L', c: '#0066ad'};
  if (searchTxt.includes('CARREFOUR')) return {n: 'C.F', c: '#3b5998'};
  if (searchTxt.includes('INTERMARCHE')) return {n: 'I.M', c: '#ca2128'};
  if (searchTxt.includes('SUPER U') || searchTxt.includes('SYSTEME U')) return {n: 'U', c: '#0055a4'};
  if (searchTxt.includes('ESSO')) return {n: 'ESSO', c: '#ed1c24'};
  if (searchTxt.includes('AVIA')) return {n: 'AVIA', c: '#e30613'};
  if (searchTxt.includes('BP')) return {n: 'BP', c: '#00a651'};
  if (searchTxt.includes('AUCHAN')) return {n: 'AU', c: '#e1000f'};
  
  // Si rien n'est trouvé, on tente d'afficher au moins le premier mot du nom ou la ville
  const fallBack = s.enseigne || s.nom || s.ville || "STATION";
  return {n: fallBack.split(' ')[0].substring(0,4).toUpperCase(), c: '#333'};
}

function getP(s, f) {
  let fuel = f === 'all' ? 'gazole' : f;
  for (let k of MAP[fuel].keys) if (parseFloat(s[k]) > 0) return parseFloat(s[k]);
  return null;
}

function setFuel(f, b) {
  activeFuel = f;
  document.querySelectorAll('.fuel-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  if (stations.length) renderList();
}

async function search() {
  const v = document.getElementById('city').value;
  if (!v) return;
  showStatus("Localisation...");
  const r = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(v)}&limit=1`);
  const d = await r.json();
  if (d.features.length) {
    uLat = d.features[0].geometry.coordinates[1];
    uLon = d.features[0].geometry.coordinates[0];
    fetchData();
  }
}

function gps() {
  navigator.geolocation.getCurrentPosition(p => {
    uLat = p.coords.latitude; uLon = p.coords.longitude; fetchData();
  });
}

async function fetchData() {
  showStatus("Scan des prix...");
  const url = `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?limit=60&where=within_distance(geom%2C%20geom'POINT(${uLon}%20${uLat})'%2C%2025km)`;
  try {
    const r = await fetch(url);
    const d = await r.json();
    stations = d.results.map(s => {
      const b = getBrandInfo(s);
      return {
        ...s,
        brand: b,
        dispName: s.enseigne || s.nom || b.n,
        dist: Math.sqrt((s.geom.lat-uLat)**2 + (s.geom.lon-uLon)**2) * 111
      };
    }).sort((a,b) => a.dist - b.dist);
    renderList();
  } catch(e) { showError("Erreur de connexion"); }
}

function renderList() {
  let html = "";
  stations.forEach(s => {
    const p = getP(s, activeFuel);
    const pColor = activeFuel !== 'all' ? MAP[activeFuel].color : '#fff';
    html += `
    <div class="card">
      <div class="st-header">
        <div class="logo-box" style="background:${s.brand.c}">${s.brand.n}</div>
        <div class="st-info">
          <div class="st-name">${s.dispName}</div>
          <div class="st-city">${s.ville} • ${s.dist.toFixed(1)} km</div>
        </div>
        <div class="price-side">
          <div class="p-val" style="color:${pColor}">${p ? p.toFixed(3) : '---'}</div>
          <div class="p-unit">€ / LITRE</div>
        </div>
      </div>
    </div>`;
  });
  document.getElementById('result').innerHTML = html || "Aucune station trouvée.";
}

function getBW() {
  let b = null, w = null;
  stations.forEach(s => {
    const p = getP(s, activeFuel); if (!p) return;
    if (!b || p < b.p) b = {s, p};
    if (!w || p > w.p) w = {s, p};
  });
  return { b, w };
}

function bestDeal() {
  const { b } = getBW(); if (!b) return;
  document.getElementById('result').innerHTML = `
    <div class="card" style="border:2px solid var(--green)">
      <div class="st-header">
        <div class="logo-box" style="background:${b.s.brand.c}">${b.s.brand.n}</div>
        <div class="st-name" style="color:var(--green)">MEILLEUR PRIX</div>
      </div>
      <div style="text-align:center; padding:20px 0;">
        <div style="font-size:3.5rem; font-weight:900; color:var(--green); font-family:'Barlow Condensed'">${b.p.toFixed(3)}€</div>
        <div style="color:#666; font-weight:700;">${b.s.dispName} (${b.s.ville})</div>
      </div>
      <button class="btn-primary wide" onclick="window.open('http://google.com/maps?q=${b.s.geom.lat},${b.s.geom.lon}')">📍 Y ALLER</button>
    </div>`;
}

function autoTikTok() {
  const { b, w } = getBW(); if (!b || !w) return;
  const gain = ((w.p - b.p) * 50).toFixed(2);
  const txt = `🚨 ALERTE CARBURANT\n\n❌ Chère : ${w.p.toFixed(3)}€\n✅ Moins chère : ${b.p.toFixed(3)}€\n\n💰 Gain : ${gain}€ sur ton plein de 50L !\n📍 Trouvé à ${b.s.ville} (${b.s.dispName})\n\n#essence #gasoil #bonplan`;
  document.getElementById('result').innerHTML = `<div class="card"><textarea rows="8" readonly>${txt}</textarea></div>`;
}

function generateVideo() {
  const { b, w } = getBW(); if (!b || !w) return;
  const p = `Video vertical 9:16. Big text overlay: "STOP PAYING ${w.p.toFixed(3)}€". Flashy transition. New text: "GO TO ${b.s.dispName} IN ${b.s.ville}". Price: ${b.p.toFixed(3)}€. Save ${((w.p-b.p)*50).toFixed(2)}€.`;
  document.getElementById('result').innerHTML = `<div class="card"><textarea rows="6" readonly>${p}</textarea></div>`;
}

function showStatus(m) { document.getElementById('result').innerHTML = `<div class="card"><div class="loader"></div> ${m}</div>`; }
function showError(m) { document.getElementById('result').innerHTML = `<div class="card" style="color:var(--red)">❌ ${m}</div>`; }
</script>
</body>
</html>
