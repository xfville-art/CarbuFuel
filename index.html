<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CarbuFuel ⛽</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0c0f">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600&display=swap');
  :root { --orange: #f0a500; --red: #e05c2a; --green: #3fb950; --bg: #0a0c0f; --card: #111318; --border: #1e2229; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: #fff; font-family: 'Barlow', sans-serif; padding: 15px; max-width: 500px; margin: auto; padding-bottom: 50px; }
  
  h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 2.2rem; font-weight: 900; background: linear-gradient(135deg, var(--orange), var(--red)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 15px; }
  
  /* Recherche */
  .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
  input { flex: 1; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: #fff; font-size: 1rem; outline: none; }
  .btn-icon { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: var(--orange); cursor: pointer; }

  /* Carburants */
  .fuel-grid { display: flex; flex-wrap: wrap; gap: 6px; margin: 15px 0; }
  .fuel-btn { padding: 8px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: #666; font-size: 0.8rem; font-weight: 800; cursor: pointer; }
  .fuel-btn.active { background: var(--orange); color: #000; border-color: var(--orange); }

  /* Actions */
  .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
  .wide { grid-column: 1 / -1; }
  button { padding: 12px; border-radius: 10px; border: none; font-weight: 700; font-family: 'Barlow Condensed'; cursor: pointer; font-size: 1rem; }
  .btn-primary { background: linear-gradient(135deg, var(--orange), var(--red)); color: #000; }
  .btn-ghost { background: var(--card); color: #aaa; border: 1px solid var(--border); }

  /* Cards */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; margin-bottom: 10px; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  .st-header { display: flex; align-items: center; gap: 12px; }
  .logo-box { width: 45px; height: 45px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #fff; flex-shrink: 0; font-size: 0.8rem; text-align: center; line-height: 1; }
  
  .st-info { flex: 1; min-width: 0; }
  .st-name { font-family: 'Barlow Condensed'; font-size: 1.2rem; font-weight: 800; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
  .st-city { color: #555; font-size: 0.75rem; font-weight: 600; }
  
  .price-side { text-align: right; }
  .p-val { font-family: 'Barlow Condensed'; font-size: 1.6rem; font-weight: 900; color: var(--orange); line-height: 1; }
  .p-unit { font-size: 0.6rem; color: #444; font-weight: 800; }

  textarea { width: 100%; background: #080a0d; color: var(--green); border: 1px solid var(--border); border-radius: 10px; padding: 12px; font-family: monospace; font-size: 0.85rem; margin-top: 10px; resize: none; }
  .loader { width: 20px; height: 20px; border: 3px solid #333; border-top-color: var(--orange); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<h1>⛽ CarbuFuel</h1>

<div class="search-row">
  <input id="city" type="text" placeholder="Ville ou Code Postal..." onkeydown="if(event.key==='Enter')search()">
  <div class="btn-icon" onclick="search()">🔍</div>
  <div class="btn-icon" onclick="gps()">📍</div>
</div>

<div class="fuel-grid">
  <button class="fuel-btn active" onclick="setFuel('all',this)">TOUS</button>
  <button class="fuel-btn" onclick="setFuel('gazole',this)">GAZOLE</button>
  <button class="fuel-btn" onclick="setFuel('e10',this)">E10</button>
  <button class="fuel-btn" onclick="setFuel('sp98',this)">SP98</button>
  <button class="fuel-btn" onclick="setFuel('e85',this)">E85</button>
</div>

<div class="action-grid">
  <button class="btn-primary wide" onclick="bestDeal()">🔥 LE MOINS CHER</button>
  <button class="btn-ghost" onclick="renderList()">📋 LISTE</button>
  <button class="btn-ghost" onclick="autoTikTok()">🎬 SCRIPT TIKTOK</button>
  <button class="btn-ghost wide" onclick="generateVideo()">🎥 PROMPT VIDÉO IA</button>
</div>

<div id="result"></div>

<script>
let stations = [], activeFuel = 'all', uLat, uLon;

const MAP = {
  gazole: ['gazole_prix','Gazole'], e10: ['e10_prix','E10'],
  sp98: ['sp98_prix','SP98'], e85: ['e85_prix','E85']
};

// Système de détection de marque amélioré
function getBrandInfo(s) {
  const t = ((s.enseigne || "") + " " + (s.nom || "") + " " + (s.adresse || "")).toUpperCase();
  if (t.includes('TOTAL')) return {n: 'TOTAL', c: '#ff3030'};
  if (t.includes('LECLERC')) return {n: 'E.L', c: '#0066ad'};
  if (t.includes('CARREFOUR')) return {n: 'C.F', c: '#3b5998'};
  if (t.includes('INTERMARCHE')) return {n: 'I.M', c: '#ca2128'};
  if (t.includes('U') && (t.includes('SUPER') || t.includes('SYSTEME'))) return {n: 'U', c: '#0055a4'};
  if (t.includes('ESSO')) return {n: 'ESSO', c: '#ed1c24'};
  if (t.includes('AVIA')) return {n: 'AVIA', c: '#e30613'};
  if (t.includes('BP')) return {n: 'BP', c: '#00a651'};
  if (t.includes('AUCHAN')) return {n: 'AU', c: '#e1000f'};
  return {n: '⛽', c: '#333'};
}

function getP(s, f) {
  let fuel = f === 'all' ? 'gazole' : f;
  for (let k of MAP[fuel]) if (parseFloat(s[k]) > 0) return parseFloat(s[k]);
  return null;
}

function setFuel(f, b) {
  activeFuel = f;
  document.querySelectorAll('.fuel-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  if (stations.length) renderList();
}

async function search() {
  const v = document.getElementById('city').value;
  if (!v) return;
  showStatus("Localisation...");
  try {
    const r = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(v)}&limit=1`);
    const d = await r.json();
    if (d.features.length) {
      uLat = d.features[0].geometry.coordinates[1];
      uLon = d.features[0].geometry.coordinates[0];
      fetchData();
    }
  } catch(e) { showError("Ville introuvable"); }
}

function gps() {
  navigator.geolocation.getCurrentPosition(p => {
    uLat = p.coords.latitude; uLon = p.coords.longitude; fetchData();
  }, () => showError("GPS refusé"));
}

async function fetchData() {
  showStatus("Chargement des prix...");
  const url = `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?limit=60&where=within_distance(geom%2C%20geom'POINT(${uLon}%20${uLat})'%2C%2025km)`;
  try {
    const r = await fetch(url);
    const d = await r.json();
    stations = d.results.map(s => {
      const brand = getBrandInfo(s);
      return {
        ...s,
        cleanName: brand.n !== '⛽' ? brand.n : (s.enseigne || s.nom || s.ville || "Station"),
        brand: brand,
        dist: Math.sqrt((s.geom.lat-uLat)**2 + (s.geom.lon-uLon)**2) * 111
      };
    }).sort((a,b) => a.dist - b.dist);
    renderList();
  } catch(e) { showError("Erreur API"); }
}

function renderList() {
  let html = `<p style="color:#555; font-size:0.7rem; font-weight:800; margin-bottom:10px; text-transform:uppercase">Stations à proximité</p>`;
  stations.forEach(s => {
    const p = getP(s, activeFuel);
    html += `
    <div class="card">
      <div class="st-header">
        <div class="logo-box" style="background:${s.brand.c}">${s.brand.n}</div>
        <div class="st-info">
          <div class="st-name">${s.cleanName}</div>
          <div class="st-city">${s.ville} • ${s.dist.toFixed(1)} km</div>
        </div>
        <div class="price-side">
          <div class="p-val">${p ? p.toFixed(3) : '---'}</div>
          <div class="p-unit">€ / L</div>
        </div>
      </div>
    </div>`;
  });
  document.getElementById('result').innerHTML = html || "Aucun résultat.";
}

function getBW() {
  let b = null, w = null;
  stations.forEach(s => {
    const p = getP(s, activeFuel); if (!p) return;
    if (!b || p < b.p) b = {s, p};
    if (!w || p > w.p) w = {s, p};
  });
  return { b, w };
}

function bestDeal() {
  const { b } = getBW(); if (!b) return;
  document.getElementById('result').innerHTML = `
    <div class="card" style="border:2px solid var(--green)">
      <div class="st-header">
        <div class="logo-box" style="background:${b.s.brand.c}">${b.s.brand.n}</div>
        <div class="st-name" style="color:var(--green)">MEILLEUR PRIX</div>
      </div>
      <div style="text-align:center; padding:20px 0;">
        <div style="font-size:3.5rem; font-weight:900; color:var(--green); font-family:'Barlow Condensed'">${b.p.toFixed(3)}€</div>
        <div style="color:#555; font-weight:700;">${b.s.cleanName} - ${b.s.ville}</div>
      </div>
      <button class="btn-primary wide" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${b.s.geom.lat},${b.s.geom.lon}')">📍 Y ALLER MAINTENANT</button>
    </div>`;
}

function autoTikTok() {
  const { b, w } = getBW(); if (!b || !w) return;
  const gain = ((w.p - b.p) * 50).toFixed(2);
  const txt = `🚨 ALERTE CARBURANT\n\n❌ Station chère : ${w.p.toFixed(3)}€\n✅ Moins chère : ${b.p.toFixed(3)}€\n\n💸 Tu gagnes ${gain}€ sur ton plein de 50L !\n📍 Trouvé à ${b.s.ville} chez ${b.s.cleanName}\n\n#essence #gasoil #bonplan`;
  document.getElementById('result').innerHTML = `<div class="card"><div class="st-name">🎬 SCRIPT TIKTOK</div><textarea rows="8" readonly>${txt}</textarea></div>`;
}

function generateVideo() {
  const { b, w } = getBW(); if (!b || !w) return;
  const p = `Vertical video 9:16. Night city vibes. Big text: "NE PAYE PAS ${w.p.toFixed(3)}€/L". Second text: "VIENS ICI : ${b.p.toFixed(3)}€/L". Save ${((w.p-b.p)*50).toFixed(2)}€ at ${b.s.cleanName} ${b.s.ville}.`;
  document.getElementById('result').innerHTML = `<div class="card"><div class="st-name">🎥 PROMPT VIDÉO</div><textarea rows="6" readonly>${p}</textarea></div>`;
}

function showStatus(m) { document.getElementById('result').innerHTML = `<div class="card"><div class="loader"></div> ${m}</div>`; }
function showError(m) { document.getElementById('result').innerHTML = `<div class="card" style="color:var(--red)">❌ ${m}</div>`; }
</script>
</body>
</html>
