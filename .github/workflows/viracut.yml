name: VIRACUT Render
on:
  workflow_dispatch:
    inputs:
      payload:
        description: 'JSON payload with video URLs and settings'
        required: true
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Parse and download videos
        run: |
          echo '${{ inputs.payload }}' > payload.json
          python3 - <<'PYEOF'
import json, urllib.request, os, base64

payload = json.load(open('payload.json'))
os.makedirs('inputs', exist_ok=True)

for i, vid in enumerate(payload['videos']):
    # Décoder base64
    with open(f'inputs/v{i}.mp4', 'wb') as f:
        f.write(base64.b64decode(vid['data']))
    print(f"Video {i}: {vid['role']} ({vid['dur']:.1f}s)")

# Écrire les settings
with open('settings.json', 'w') as f:
    json.dump(payload['settings'], f)
print("Settings:", payload['settings'])
PYEOF

      - name: Build ffmpeg command
        run: |
          python3 - <<'PYEOF'
import json, subprocess, os

settings = json.load(open('settings.json'))
payload   = json.load(open('payload.json'))
videos    = payload['videos']
sil_thr   = settings.get('silThr', 0.28)
grade     = settings.get('grade', 0.7)
hook_zoom = settings.get('hookZoom', 0.5)
cur_text  = settings.get('curText', '')
rep_text  = settings.get('repText', '')

# Construire les intervalles (ex: silences déjà analysés côté client)
segments = payload['segments']  # [{vidIdx, start, end, phase}]

# Construire le filtergraph ffmpeg
inputs = []
filter_parts = []
concat_v = []
concat_a = []

for i, seg in enumerate(segments):
    vi = seg['vidIdx']
    start = seg['start']
    end   = seg['end']
    phase = seg['phase']
    dur   = end - start

    inputs += ['-ss', str(start), '-t', str(dur), '-i', f'inputs/v{vi}.mp4']
    
    vf_parts = []
    
    # Scale to 720x1280 (portrait TikTok)
    vf_parts.append('scale=720:1280:force_original_aspect_ratio=decrease')
    vf_parts.append('pad=720:1280:(ow-iw)/2:(oh-ih)/2:black')
    
    # Ken Burns zoom sur hook
    if phase == 'hook' and hook_zoom > 0.02:
        zoom_end = 1 + hook_zoom * 0.25
        vf_parts.append(f"zoompan=z='min(zoom+0.001,{zoom_end:.3f})':x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':d={int(dur*30)}:fps=30:s=720x1280")
    else:
        vf_parts.append('fps=30')
    
    # Color grade
    if grade > 0:
        contrast = 1 + grade * 0.2
        brightness = -grade * 0.05
        vf_parts.append(f'eq=contrast={contrast:.2f}:brightness={brightness:.3f}:saturation=1.1')
        # Warm tone via curves
        vf_parts.append(f'curves=r=0/0 0.8/{min(1.0, 0.85+grade*0.15):.2f} 1/1:b=0/0 0.8/{max(0.0, 0.72-grade*0.1):.2f} 1/{max(0.0, 0.9-grade*0.1):.2f}')
    
    # Letterbox
    vf_parts.append(f'drawbox=y=0:w=iw:h=ih*0.083:color=black:t=fill,drawbox=y=ih*0.917:w=iw:h=ih*0.083:color=black:t=fill')
    
    # Timestamps PARFAITS: setpts rebase chaque segment à partir de 0
    # puis concat les assemble avec pts continus
    vf_parts.append('setpts=PTS-STARTPTS')
    
    filter_parts.append(f'[{i}:v]{"","".join(vf_parts).replace(",",",")}[v{i}]')
    filter_parts.append(f'[{i}:a]aresample=48000,asetpts=PTS-STARTPTS[a{i}]')
    concat_v.append(f'[v{i}]')
    concat_a.append(f'[a{i}]')

n = len(segments)
concat_str = ''.join(concat_v) + ''.join(concat_a)
filter_parts.append(f'{concat_str}concat=n={n}:v=1:a=1[outv][outa]')

# Écriture propre des timestamps via minterpolate puis setpts
filter_str = ';'.join(filter_parts)

cmd = inputs + [
    '-filter_complex', filter_str,
    '-map', '[outv]', '-map', '[outa]',
    '-c:v', 'libx264', '-preset', 'fast', '-crf', '23',
    '-c:a', 'aac', '-b:a', '192k',
    # Forcer 30fps EXACT avec timestamps parfaits
    '-r', '30', '-vsync', 'cfr',
    '-movflags', '+faststart',
    'output.mp4'
]

print('CMD:', 'ffmpeg', ' '.join(str(x) for x in cmd[:20]), '...')

result = subprocess.run(['ffmpeg', '-y'] + cmd, capture_output=True, text=True)
if result.returncode != 0:
    print("STDERR:", result.stderr[-3000:])
    raise Exception("ffmpeg failed")
print("SUCCESS: output.mp4 created")

import os
size = os.path.getsize('output.mp4')
print(f"Size: {size/1024/1024:.1f} MB")
PYEOF

      - name: Verify output
        run: |
          ffprobe -v error -select_streams v:0 -show_entries stream=r_frame_rate,duration -of csv=p=0 output.mp4
          ffprobe -v error -select_streams v:0 -show_entries packet=pts_time -of csv=p=0 output.mp4 | python3 -c "
import sys
times=[float(l.strip()) for l in sys.stdin if l.strip()]
gaps=[(times[i+1]-times[i])*1000 for i in range(len(times)-1)]
perfect=sum(1 for g in gaps if abs(g-33.333)<0.5)
print(f'Frames: {len(times)}, Perfect gaps: {perfect}/{len(gaps)} ({perfect/len(gaps)*100:.1f}%)')
print(f'Max gap: {max(gaps):.2f}ms, Stddev: {(sum((g-33.333)**2 for g in gaps)/len(gaps))**.5:.3f}ms')
"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: viracut-output
          path: output.mp4
          retention-days: 1
